<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>吃了吗？</title>
<style>
  :root { --bg:#1b1530; --card:#2a2150; --accent:#ff7a59; --text:#fff; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; }
  body {
    background:#1b1530; color:var(--text);
    font-family:-apple-system,"PingFang SC","Helvetica Neue",sans-serif;
    min-height:100%; user-select:none; overflow-x:hidden;
  }
  /* 动态极光背景 */
  body::before{ content:""; position:fixed; inset:-30%; z-index:-2;
    background:
      radial-gradient(40% 40% at 25% 20%, rgba(157,140,255,.45), transparent 60%),
      radial-gradient(45% 45% at 80% 15%, rgba(255,122,89,.40), transparent 60%),
      radial-gradient(50% 50% at 60% 85%, rgba(92,200,255,.35), transparent 60%),
      radial-gradient(45% 45% at 15% 80%, rgba(255,143,177,.35), transparent 60%);
    filter:blur(8px); animation:aurora 18s ease-in-out infinite alternate; }
  @keyframes aurora{ 0%{transform:translate(0,0) scale(1)} 50%{transform:translate(3%,-2%) scale(1.12)} 100%{transform:translate(-3%,2%) scale(1.05)} }

  /* 飘食物 */
  .bg{ position:fixed; inset:0; z-index:-1; overflow:hidden; pointer-events:none; }
  .bg span{ position:absolute; bottom:-50px; font-size:26px; opacity:0; animation:rise linear infinite; }
  @keyframes rise{ 0%{transform:translateY(0) rotate(0); opacity:0} 12%{opacity:.16} 88%{opacity:.16} 100%{transform:translateY(-118vh) rotate(220deg); opacity:0} }

  #app { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; padding:18px 16px 30px; gap:14px; min-height:100vh; }

  .hdr { width:100%; max-width:440px; display:flex; align-items:center; justify-content:space-between; }
  .ttl { font-size:23px; font-weight:900; letter-spacing:1px; text-shadow:0 2px 10px rgba(0,0,0,.4); }
  .back { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12); color:#cdbcff;
          font-size:15px; font-weight:600; cursor:pointer; padding:6px 12px; border-radius:999px; }
  .back:active{ transform:scale(.94); }

  .menu { display:flex; flex-direction:column; gap:18px; width:100%; align-items:center; margin-top:42px; }
  .mbtn { position:relative; width:min(82vw,310px); padding:26px; border:none; border-radius:22px; color:#fff;
          font-size:22px; font-weight:900; cursor:pointer; overflow:hidden;
          box-shadow:0 10px 26px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.35);
          transition:transform .12s, box-shadow .2s; text-shadow:0 2px 6px rgba(0,0,0,.25); }
  .mbtn::before{ content:""; position:absolute; top:0; left:0; right:0; height:45%;
                 background:linear-gradient(rgba(255,255,255,.28), transparent); }
  .mbtn:active{ transform:scale(.96) translateY(2px); box-shadow:0 5px 14px rgba(0,0,0,.4); }

  /* 首页 hero */
  .hero{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px; width:100%; }
  .hero .menu{ margin-top:0; }
  .herottl{ font-size:48px; font-weight:900; letter-spacing:2px; line-height:1.1; text-align:center;
            background:linear-gradient(135deg,#ffe08a 0%,#ff7a59 55%,#ff5fa2 100%);
            -webkit-background-clip:text; background-clip:text; color:transparent;
            filter:drop-shadow(0 6px 16px rgba(255,122,89,.35)); animation:bob 3s ease-in-out infinite; }
  @keyframes bob{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
  .garland{ font-size:22px; letter-spacing:7px; opacity:.92; margin-top:-8px; }
  .slogan{ font-size:15px; line-height:1.9; text-align:center; max-width:300px; font-weight:600; color:#ffe2d4;
           padding:13px 20px; border-radius:16px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.12);
           box-shadow:0 6px 18px rgba(0,0,0,.25); }

  .top { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; max-width:440px; width:100%; }
  .chip { border:1px solid rgba(255,255,255,.16); background:rgba(255,255,255,.07); color:#fff;
          padding:8px 14px; border-radius:999px; font-size:14px; cursor:pointer; transition:.18s;
          backdrop-filter:blur(6px); }
  .chip:active{ transform:scale(.93); }
  .chip.on { background:linear-gradient(135deg,var(--accent),#ff5a8a); border-color:transparent; font-weight:800;
             box-shadow:0 4px 14px rgba(255,122,89,.5); }
  .sel { background:rgba(255,255,255,.1); color:#fff; border:1px solid rgba(255,255,255,.25);
         padding:11px 18px; border-radius:14px; font-size:17px; font-weight:800; text-align:center;
         box-shadow:0 4px 14px rgba(0,0,0,.3); }

  .stage { position:relative; width:min(86vw,340px); aspect-ratio:1/1; margin-top:6px;
           filter:drop-shadow(0 12px 30px rgba(0,0,0,.5)); }
  .pointer { position:absolute; top:-8px; left:50%; transform:translateX(-50%); width:0; height:0;
             border-left:15px solid transparent; border-right:15px solid transparent;
             border-top:24px solid #fff; z-index:5; filter:drop-shadow(0 2px 4px rgba(0,0,0,.6)); }
  .wheel { width:100%; height:100%; transform:rotate(0deg); border-radius:50%;
           box-shadow:0 0 0 6px rgba(255,255,255,.12), 0 0 30px rgba(157,140,255,.4); }
  .spinning .wheel { transition:transform 4.2s cubic-bezier(.17,.67,.2,1); }
  .hub { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:78px; height:78px;
         border-radius:50%; background:radial-gradient(circle at 35% 30%, #fff3, transparent 60%), linear-gradient(135deg,var(--accent),#ff4f7e);
         color:#fff; display:flex; align-items:center; justify-content:center; font-size:17px; font-weight:900;
         cursor:pointer; box-shadow:0 6px 18px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.5); z-index:4; }
  .hub:active{ transform:translate(-50%,-50%) scale(.92); }
  .result { font-size:26px; font-weight:900; min-height:34px; text-align:center; text-shadow:0 2px 10px rgba(0,0,0,.4); }
  .result span { background:linear-gradient(135deg,#ffd56b,#ff7a59); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .result.pop{ animation:pop .5s cubic-bezier(.2,1.4,.4,1); }
  @keyframes pop{ 0%{transform:scale(.4); opacity:0} 60%{transform:scale(1.18)} 100%{transform:scale(1); opacity:1} }
  .again { border:none; background:linear-gradient(135deg,var(--accent),#ff4f7e); color:#fff; font-size:17px; font-weight:800;
           padding:13px 32px; border-radius:999px; cursor:pointer; box-shadow:0 6px 18px rgba(255,80,120,.5); }
  .again:active { transform:scale(.95); }

  /* 右下角吃饭小人 */
  .eater{ position:fixed; right:14px; bottom:14px; width:96px; height:96px; z-index:40; pointer-events:none; }
  .eater>div{ position:absolute; }
  .eater .char{ left:24px; bottom:30px; font-size:42px; transform-origin:bottom; animation:chew .55s ease-in-out infinite; }
  .eater .bowl{ left:20px; bottom:0; font-size:48px; filter:drop-shadow(0 4px 6px rgba(0,0,0,.4)); }
  .eater .chop{ left:2px; bottom:20px; font-size:34px; transform-origin:bottom right; animation:eat 1.1s ease-in-out infinite; }
  .eater .steam{ left:38px; bottom:46px; display:flex; gap:6px; }
  .eater .steam i{ width:5px; height:5px; border-radius:50%; background:rgba(255,255,255,.55); animation:steam 1.7s ease-in infinite; }
  .eater .steam i:nth-child(2){ animation-delay:.55s } .eater .steam i:nth-child(3){ animation-delay:1.1s }
  @keyframes chew{ 0%,100%{transform:translateY(0) scaleY(1)} 50%{transform:translateY(3px) scaleY(.92)} }
  @keyframes eat{ 0%,100%{transform:translate(0,7px) rotate(14deg)} 50%{transform:translate(-5px,-7px) rotate(-6deg)} }
  @keyframes steam{ 0%{opacity:0; transform:translateY(0) scale(.5)} 30%{opacity:.7} 100%{opacity:0; transform:translateY(-24px) scale(1.4)} }

  /* 爆彩 */
  .confetti{ position:fixed; font-size:26px; z-index:70; pointer-events:none; will-change:transform,opacity; animation:boom 1.1s ease-out forwards; }
  @keyframes boom{ 0%{transform:translate(-50%,-50%) scale(.3); opacity:0} 15%{opacity:1} 100%{transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1) rotate(50deg); opacity:0} }
</style>
</head>
<body>
  <div class="bg">
    <span style="left:6%;animation-duration:14s;animation-delay:0s">🍜</span>
    <span style="left:16%;animation-duration:19s;animation-delay:3s">🍔</span>
    <span style="left:27%;animation-duration:16s;animation-delay:6s">🍣</span>
    <span style="left:38%;animation-duration:21s;animation-delay:1s">🍕</span>
    <span style="left:49%;animation-duration:15s;animation-delay:8s">🍗</span>
    <span style="left:60%;animation-duration:20s;animation-delay:4s">🍙</span>
    <span style="left:70%;animation-duration:17s;animation-delay:10s">🥟</span>
    <span style="left:80%;animation-duration:22s;animation-delay:2s">🌮</span>
    <span style="left:90%;animation-duration:16s;animation-delay:7s">🍱</span>
    <span style="left:33%;animation-duration:23s;animation-delay:12s">🧋</span>
    <span style="left:55%;animation-duration:18s;animation-delay:9s">🍰</span>
    <span style="left:85%;animation-duration:24s;animation-delay:14s">🍤</span>
  </div>

  <div id="app"></div>

  <div class="eater" aria-hidden="true">
    <div class="steam"><i></i><i></i><i></i></div>
    <div class="char">😋</div>
    <div class="chop">🥢</div>
    <div class="bowl">🍜</div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
