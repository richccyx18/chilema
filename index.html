<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>吃了吗？</title>
<style>
  :root { --bg:#1b1530; --card:#251c45; --accent:#ff7a59; --text:#fff; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; }
  body {
    background:radial-gradient(120% 120% at 50% 0%, #2a2152 0%, var(--bg) 60%);
    color:var(--text); font-family:-apple-system,"PingFang SC","Helvetica Neue",sans-serif;
    min-height:100%; user-select:none;
  }
  #app { display:flex; flex-direction:column; align-items:center; padding:16px 16px 30px; gap:14px; min-height:100vh; }

  .hdr { width:100%; max-width:440px; display:flex; align-items:center; justify-content:space-between; }
  .ttl { font-size:21px; font-weight:800; letter-spacing:1px; }
  .back { background:none; border:none; color:#9d8cff; font-size:16px; font-weight:600; cursor:pointer; padding:6px; }

  .menu { display:flex; flex-direction:column; gap:16px; width:100%; align-items:center; margin-top:40px; }
  .mbtn { width:min(80vw,300px); padding:24px; border:none; border-radius:18px; color:#fff;
          font-size:21px; font-weight:800; cursor:pointer; box-shadow:0 6px 18px rgba(0,0,0,.4); }
  .mbtn:active { transform:scale(.97); }

  .top { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; max-width:440px; width:100%; }
  .chip { border:1px solid rgba(255,255,255,.18); background:var(--card); color:#fff;
          padding:7px 13px; border-radius:999px; font-size:14px; cursor:pointer; }
  .chip.on { background:var(--accent); border-color:var(--accent); font-weight:700; }
  .sel { background:var(--card); color:#fff; border:1px solid rgba(255,255,255,.25);
         padding:10px 16px; border-radius:12px; font-size:17px; font-weight:700; text-align:center; }

  .stage { position:relative; width:min(86vw,340px); aspect-ratio:1/1; margin-top:4px; }
  .pointer { position:absolute; top:-6px; left:50%; transform:translateX(-50%); width:0; height:0;
             border-left:14px solid transparent; border-right:14px solid transparent;
             border-top:22px solid var(--accent); z-index:5; filter:drop-shadow(0 2px 3px rgba(0,0,0,.5)); }
  .wheel { width:100%; height:100%; transform:rotate(0deg); }
  .spinning .wheel { transition:transform 4.2s cubic-bezier(.17,.67,.2,1); }
  .hub { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:74px; height:74px;
         border-radius:50%; background:var(--accent); color:#fff; display:flex; align-items:center;
         justify-content:center; font-size:16px; font-weight:700; cursor:pointer; box-shadow:0 4px 14px rgba(0,0,0,.45); z-index:4; }
  .result { font-size:25px; font-weight:800; min-height:32px; text-align:center; }
  .result span { color:var(--accent); }
  .again { border:none; background:var(--accent); color:#fff; font-size:17px; font-weight:700;
           padding:12px 30px; border-radius:999px; cursor:pointer; box-shadow:0 4px 14px rgba(255,122,89,.4); }
  .again:active { transform:scale(.96); }
</style>
</head>
<body>
  <div id="app"></div>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
